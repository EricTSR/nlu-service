version: "3.8"
services:
  nlu-service:
    image: nlu-service:latest
    restart: always
    ports:
      - "8000:8000"
    environment:
      WEB_CONCURRENCY: 4
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

